server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin reverse proxy to the backend API. All API traffic is namespaced
    # under /api so it never collides with SPA routes (e.g. /teams, /epics); the
    # trailing slash on proxy_pass strips /api before forwarding to the backend,
    # which serves at root.
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
