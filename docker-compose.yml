services:
  postgres:
    image: postgres:18
    container_name: kanban-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kanban}
      POSTGRES_USER: ${POSTGRES_USER:-kanban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kanban}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # PostgreSQL 18 uses a version-specific PGDATA (/var/lib/postgresql/18/docker),
      # so the volume mounts at the parent directory to persist data correctly.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kanban} -d ${POSTGRES_DB:-kanban}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: kanban-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-kanban}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-kanban}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-kanban}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: kanban-pgadmin
    environment:
      # pgAdmin validates the domain is globally deliverable, so a .local domain is
      # rejected. example.com (RFC 2606, reserved) passes the check.
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
