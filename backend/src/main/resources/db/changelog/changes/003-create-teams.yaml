databaseChangeLog:
  - changeSet:
      id: 003-create-teams
      author: kanban
      changes:
        - createTable:
            tableName: teams
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_teams
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: modified_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
  - changeSet:
      id: 003-teams-name-unique-ci
      author: kanban
      changes:
        - sql:
            sql: CREATE UNIQUE INDEX ux_teams_name_lower ON teams (LOWER(name))
      rollback:
        - sql:
            sql: DROP INDEX ux_teams_name_lower
