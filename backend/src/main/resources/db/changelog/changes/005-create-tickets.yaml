databaseChangeLog:
  - changeSet:
      id: 005-create-tickets
      author: kanban
      changes:
        - createTable:
            tableName: tickets
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_tickets
                    nullable: false
              - column:
                  name: team_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: epic_id
                  type: UUID
              - column:
                  name: type
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
              - column:
                  name: state
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: body
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_by_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: modified_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            constraintName: fk_tickets_team
            baseTableName: tickets
            baseColumnNames: team_id
            referencedTableName: teams
            referencedColumnNames: id
            onDelete: RESTRICT
        - addForeignKeyConstraint:
            constraintName: fk_tickets_epic
            baseTableName: tickets
            baseColumnNames: epic_id, team_id
            referencedTableName: epics
            referencedColumnNames: id, team_id
            onDelete: RESTRICT
        - addForeignKeyConstraint:
            constraintName: fk_tickets_created_by
            baseTableName: tickets
            baseColumnNames: created_by_id
            referencedTableName: users
            referencedColumnNames: id
        - createIndex:
            indexName: ix_tickets_team_id
            tableName: tickets
            columns:
              - column:
                  name: team_id
        - createIndex:
            indexName: ix_tickets_epic_id
            tableName: tickets
            columns:
              - column:
                  name: epic_id
        - createIndex:
            indexName: ix_tickets_created_by_id
            tableName: tickets
            columns:
              - column:
                  name: created_by_id
  - changeSet:
      id: 005-tickets-type-check
      author: kanban
      changes:
        - sql:
            sql: "ALTER TABLE tickets ADD CONSTRAINT ck_tickets_type CHECK (type IN ('BUG', 'FEATURE', 'FIX'))"
      rollback:
        - sql:
            sql: ALTER TABLE tickets DROP CONSTRAINT ck_tickets_type
  - changeSet:
      id: 005-tickets-state-check
      author: kanban
      changes:
        - sql:
            sql: "ALTER TABLE tickets ADD CONSTRAINT ck_tickets_state CHECK (state IN ('NEW', 'READY_FOR_IMPLEMENTATION', 'IN_PROGRESS', 'READY_FOR_ACCEPTANCE', 'DONE'))"
      rollback:
        - sql:
            sql: ALTER TABLE tickets DROP CONSTRAINT ck_tickets_state
