databaseChangeLog:
  - changeSet:
      id: 006-create-comments
      author: kanban
      changes:
        - createTable:
            tableName: comments
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_comments
                    nullable: false
              - column:
                  name: ticket_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: author_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: body
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            constraintName: fk_comments_ticket
            baseTableName: comments
            baseColumnNames: ticket_id
            referencedTableName: tickets
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_comments_author
            baseTableName: comments
            baseColumnNames: author_id
            referencedTableName: users
            referencedColumnNames: id
        - createIndex:
            indexName: ix_comments_ticket_id
            tableName: comments
            columns:
              - column:
                  name: ticket_id
        - createIndex:
            indexName: ix_comments_author_id
            tableName: comments
            columns:
              - column:
                  name: author_id
