spring.application.name=kanban

# Datasource. Defaults target a local Postgres on the host; in Docker Compose these
# are overridden by the SPRING_DATASOURCE_* environment variables (relaxed binding).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kanban}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:kanban}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:kanban}

# Liquibase owns schema management, so Hibernate only validates the mapping.
spring.jpa.hibernate.ddl-auto=validate
